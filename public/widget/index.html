<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yellow Dog Help</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --yds-yellow: #FEDD00;
    --yds-yellow-soft: #FFF6B8;
    --yds-charcoal: #2D2926;
    --yds-charcoal-80: rgba(45, 41, 38, 0.8);
    --yds-charcoal-60: rgba(45, 41, 38, 0.6);
    --yds-charcoal-40: rgba(45, 41, 38, 0.4);
    --surface: #ffffff;
    --surface-muted: #f7f6f3;
    --border: #e9e6e1;
    --border-strong: #d9d5cd;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    font-family: var(--font);
    color: var(--yds-charcoal);
    background: var(--surface);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: var(--yds-charcoal);
    color: #fff;
    gap: 12px;
    flex-shrink: 0;
  }
  .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .brand-mark {
    width: 32px; height: 32px;
    background: var(--yds-yellow);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .brand-mark svg { width: 20px; height: 20px; }
  .brand-text { display: flex; flex-direction: column; min-width: 0; }
  .brand-title { font-size: 14px; font-weight: 600; line-height: 1.2; }
  .brand-sub { font-size: 11px; color: rgba(255,255,255,0.6); line-height: 1.2; }
  .close-btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    display: flex;
    transition: background 0.15s, color 0.15s;
  }
  .close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .close-btn svg { width: 18px; height: 18px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    background: var(--surface-muted);
  }

  .empty {
    text-align: center;
    padding: 28px 12px;
    color: var(--yds-charcoal-60);
    font-size: 13px;
    line-height: 1.6;
  }
  .empty-title {
    font-weight: 600;
    color: var(--yds-charcoal);
    font-size: 15px;
    margin-bottom: 4px;
  }
  .empty-examples {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 18px;
    align-items: stretch;
  }
  .example {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--yds-charcoal);
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
  }
  .example:hover {
    border-color: var(--yds-yellow);
    background: var(--yds-yellow-soft);
  }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.5;
    font-size: 14px;
    max-width: 90%;
    word-wrap: break-word;
  }
  .msg.user {
    background: var(--yds-charcoal);
    color: #fff;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }
  .msg.bot {
    background: var(--surface);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }
  .msg.bot p { margin-bottom: 8px; }
  .msg.bot p:last-child { margin-bottom: 0; }
  .msg.bot ol, .msg.bot ul { margin: 6px 0 6px 20px; }
  .msg.bot li { margin-bottom: 3px; }
  .msg.bot code {
    background: var(--surface-muted);
    border: 1px solid var(--border);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .msg.bot a {
    color: var(--yds-charcoal);
    text-decoration: underline;
    text-decoration-color: var(--yds-yellow);
    text-decoration-thickness: 2px;
    text-underline-offset: 2px;
  }
  .msg.bot a:hover { text-decoration-color: var(--yds-charcoal); }

  .sources {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 12px;
  }
  .sources-label {
    font-weight: 600;
    color: var(--yds-charcoal-60);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 10px;
    margin-bottom: 4px;
  }
  .sources a {
    color: var(--yds-charcoal);
    text-decoration: none;
    display: block;
    margin-top: 3px;
    padding: 3px 0;
  }
  .sources a:hover { text-decoration: underline; text-decoration-color: var(--yds-yellow); }

  .loading {
    color: var(--yds-charcoal-60);
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .dots { display: inline-flex; gap: 4px; }
  .dots span {
    width: 6px; height: 6px;
    background: var(--yds-yellow);
    border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out;
  }
  .dots span:nth-child(2) { animation-delay: 0.15s; }
  .dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-4px); opacity: 1; }
  }

  form {
    display: flex;
    gap: 8px;
    padding: 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  input[type=text] {
    flex: 1;
    padding: 11px 14px;
    font-size: 14px;
    border: 1px solid var(--border-strong);
    border-radius: 9px;
    outline: none;
    font-family: inherit;
    color: var(--yds-charcoal);
    background: var(--surface);
    transition: border-color 0.15s, box-shadow 0.15s;
    min-width: 0;
  }
  input[type=text]:focus {
    border-color: var(--yds-yellow);
    box-shadow: 0 0 0 3px var(--yds-yellow-soft);
  }
  input[type=text]::placeholder { color: var(--yds-charcoal-40); }

  button.send {
    padding: 11px 16px;
    font-size: 14px;
    font-weight: 600;
    background: var(--yds-charcoal);
    color: #fff;
    border: none;
    border-radius: 9px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  button.send:hover { background: #000; }
  button.send:disabled {
    background: var(--border-strong);
    color: var(--yds-charcoal-40);
    cursor: not-allowed;
  }

  footer {
    font-size: 10px;
    color: var(--yds-charcoal-40);
    text-align: center;
    padding: 6px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    line-height: 1.4;
    flex-shrink: 0;
  }

  .feedback {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--yds-charcoal-60);
    flex-wrap: wrap;
  }
  .feedback-btn {
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--yds-charcoal);
    cursor: pointer;
    font-family: inherit;
    transition: border-color 0.15s, background 0.15s;
  }
  .feedback-btn:hover { border-color: var(--yds-yellow); background: var(--yds-yellow-soft); }
  .feedback-resolved {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--yds-charcoal-60);
    font-style: italic;
  }

  .escalate-form {
    margin-top: 10px;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface-muted);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .escalate-form-title { font-weight: 600; font-size: 13px; color: var(--yds-charcoal); }
  .escalate-form-sub { font-size: 11px; color: var(--yds-charcoal-60); line-height: 1.4; }
  .escalate-form .row { display: flex; gap: 6px; }
  .escalate-form .row > * { flex: 1; min-width: 0; }
  .escalate-form input, .escalate-form textarea {
    width: 100%;
    padding: 8px 10px;
    font-size: 12px;
    border: 1px solid var(--border-strong);
    border-radius: 7px;
    outline: none;
    font-family: inherit;
    color: var(--yds-charcoal);
    background: var(--surface);
  }
  .escalate-form input:focus, .escalate-form textarea:focus {
    border-color: var(--yds-yellow);
    box-shadow: 0 0 0 2px var(--yds-yellow-soft);
  }
  .escalate-form textarea { min-height: 60px; resize: vertical; }
  .escalate-form .actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 2px; }
  .escalate-form button.primary {
    padding: 8px 14px;
    font-size: 12px;
    font-weight: 600;
    background: var(--yds-charcoal);
    color: #fff;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-family: inherit;
  }
  .escalate-form button.primary:hover { background: #000; }
  .escalate-form button.primary:disabled { background: var(--border-strong); color: var(--yds-charcoal-40); cursor: not-allowed; }
  .escalate-form button.secondary {
    padding: 8px 10px;
    font-size: 12px;
    background: none;
    color: var(--yds-charcoal-60);
    border: none;
    cursor: pointer;
    font-family: inherit;
  }
  .escalate-form button.secondary:hover { color: var(--yds-charcoal); }
  .escalate-form .error { font-size: 11px; color: #c0392b; }
  .escalate-success {
    margin-top: 10px;
    padding: 10px 12px;
    border: 1px solid var(--yds-yellow);
    border-radius: 10px;
    background: var(--yds-yellow-soft);
    font-size: 12px;
    line-height: 1.4;
    color: var(--yds-charcoal);
  }
</style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-mark">
        <svg viewBox="0 0 32 32" fill="#2D2926" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <ellipse cx="8" cy="10" rx="2.6" ry="3.4"/>
          <ellipse cx="14" cy="7" rx="2.4" ry="3.2"/>
          <ellipse cx="20" cy="7" rx="2.4" ry="3.2"/>
          <ellipse cx="25.5" cy="11" rx="2.5" ry="3.3"/>
          <path d="M16 14.5c-4.2 0-7.5 3.3-7.5 7 0 2.6 2 4.5 4.8 4.5 1.3 0 2.1-.5 2.7-.5s1.4.5 2.7.5c2.8 0 4.8-1.9 4.8-4.5 0-3.7-3.3-7-7.5-7z"/>
        </svg>
      </div>
      <div class="brand-text">
        <div class="brand-title">Yellow Dog Help</div>
        <div class="brand-sub">Answers from the knowledge base</div>
      </div>
    </div>
    <button class="close-btn" id="close" type="button" aria-label="Close">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 6l12 12M18 6L6 18"/>
      </svg>
    </button>
  </header>

  <div id="chat">
    <div class="empty" id="empty">
      <div class="empty-title">Ask a question</div>
      I'll answer from 1,100+ official Yellow Dog articles.
      <div class="empty-examples">
        <button class="example" type="button" data-q="How do I set par levels?">How do I set par levels?</button>
        <button class="example" type="button" data-q="How do I run a physical inventory count?">Running a physical inventory count</button>
        <button class="example" type="button" data-q="How do I reconcile variances?">Reconciling variances</button>
      </div>
    </div>
  </div>

  <form id="form">
    <input type="text" id="q" placeholder="Ask about Yellow Dog…" autocomplete="off" required>
    <button type="submit" class="send" id="send">Send</button>
  </form>

  <footer>Answers are AI-generated — verify against official docs for critical operations.</footer>

<script>
const chat = document.getElementById('chat');
const form = document.getElementById('form');
const input = document.getElementById('q');
const btn = document.getElementById('send');
const empty = document.getElementById('empty');
const closeBtn = document.getElementById('close');

closeBtn.addEventListener('click', () => {
  try { window.parent.postMessage({ type: 'yds-widget-close' }, '*'); } catch (e) {}
});

function esc(s) {
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function renderMd(text) {
  const escaped = esc(text);
  return escaped
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br>')
    .replace(/^/, '<p>')
    .concat('</p>');
}

function addMsg(cls, html) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.innerHTML = html;
  chat.appendChild(el);
  chat.scrollTop = chat.scrollHeight;
  return el;
}

function attachFeedback(botEl, question, answer, sources) {
  const fb = document.createElement('div');
  fb.className = 'feedback';
  fb.innerHTML =
    '<span>Did this help?</span>' +
    '<button class="feedback-btn" data-v="yes" type="button">Yes</button>' +
    '<button class="feedback-btn" data-v="no" type="button">No</button>';
  botEl.appendChild(fb);
  chat.scrollTop = chat.scrollHeight;

  fb.querySelectorAll('.feedback-btn').forEach(b => {
    b.addEventListener('click', () => {
      if (b.dataset.v === 'yes') {
        fb.outerHTML = '<div class="feedback-resolved">Thanks — glad that helped.</div>';
        chat.scrollTop = chat.scrollHeight;
      } else {
        fb.replaceWith(buildEscalateForm(question, answer, sources));
        chat.scrollTop = chat.scrollHeight;
      }
    });
  });
}

function buildEscalateForm(originalQuestion, botAnswer, sources) {
  const form = document.createElement('form');
  form.className = 'escalate-form';
  form.innerHTML =
    '<div class="escalate-form-title">Connect with support</div>' +
    '<div class="escalate-form-sub">We\'ll open a ticket with Yellow Dog support. Your question and the bot\'s answer are included automatically.</div>' +
    '<input type="text" name="name" placeholder="Full name" required autocomplete="name">' +
    '<div class="row">' +
      '<input type="email" name="email" placeholder="Email" required autocomplete="email">' +
      '<input type="tel" name="phone" placeholder="Phone (optional)" autocomplete="tel">' +
    '</div>' +
    '<input type="text" name="company" placeholder="Company" autocomplete="organization">' +
    '<textarea name="description" placeholder="Briefly describe what you need help with" required></textarea>' +
    '<div class="error" style="display:none"></div>' +
    '<div class="actions">' +
      '<button type="button" class="secondary" data-cancel="1">Cancel</button>' +
      '<button type="submit" class="primary">Open ticket</button>' +
    '</div>';

  const err = form.querySelector('.error');
  const submitBtn = form.querySelector('button.primary');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    err.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';

    const fd = new FormData(form);
    const payload = {
      name: fd.get('name'),
      company: fd.get('company'),
      email: fd.get('email'),
      phone: fd.get('phone'),
      description: fd.get('description'),
      originalQuestion,
      botAnswer,
      sources,
    };

    try {
      const res = await fetch('/api/escalate', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok || !data.ok) {
        err.textContent = data.error || 'Something went wrong. Please try again.';
        err.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Open ticket';
        return;
      }
      const success = document.createElement('div');
      success.className = 'escalate-success';
      if (data.ticketNumber) {
        success.innerHTML = '<strong>Ticket #' + esc(String(data.ticketNumber)) + ' opened.</strong> The Yellow Dog team will follow up by email.';
      } else {
        success.innerHTML = '<strong>Thanks — we\'ve got your request.</strong> Someone from Yellow Dog support will follow up by email.';
      }
      form.replaceWith(success);
      chat.scrollTop = chat.scrollHeight;
    } catch (ex) {
      err.textContent = 'Network error. Please try again.';
      err.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Open ticket';
    }
  });

  form.querySelector('[data-cancel]').addEventListener('click', () => {
    form.outerHTML = '<div class="feedback-resolved">No problem — ask another question if you\'d like.</div>';
    chat.scrollTop = chat.scrollHeight;
  });

  return form;
}

async function submitQuestion(question) {
  if (!question) return;
  empty.style.display = 'none';
  addMsg('user', esc(question));
  input.value = '';
  btn.disabled = true;

  const loading = addMsg('bot', '<span class="loading"><span class="dots"><span></span><span></span><span></span></span> Searching…</span>');

  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ question })
    });
    const data = await res.json();

    if (!res.ok) {
      loading.innerHTML = '<strong>Error:</strong> ' + esc(data.error || 'request failed');
      return;
    }

    let html = renderMd(data.answer);
    if (data.sources && data.sources.length > 0) {
      html += '<div class="sources"><div class="sources-label">Sources</div>' +
        data.sources.map(s => `<a href="${esc(s.url)}" target="_blank" rel="noopener noreferrer">${esc(s.title)}</a>`).join('') +
        '</div>';
    }
    loading.innerHTML = html;
    attachFeedback(loading, question, data.answer, data.sources || []);
  } catch (err) {
    loading.innerHTML = '<strong>Error:</strong> ' + esc(err.message);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  submitQuestion(input.value.trim());
});

document.querySelectorAll('.example').forEach(b => {
  b.addEventListener('click', () => submitQuestion(b.dataset.q));
});

input.focus();
</script>
</body>
</html>
